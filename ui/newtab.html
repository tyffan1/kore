<div id="newtab-page" class="newtab-page">
  <div class="newtab-search">
    <div class="newtab-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="var(--accent)"/>
        <text x="24" y="32" text-anchor="middle" fill="var(--text-on-accent)" font-family="var(--font-sans)" font-size="22" font-weight="700">K</text>
      </svg>
    </div>
    <div class="newtab-search-bar">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="newtab-search-input" type="text" class="newtab-search-input" placeholder="Search or enter address" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" />
    </div>
  </div>

  <div class="speed-dial">
    <h2 class="speed-dial-title">Top Sites</h2>
    <div id="speed-dial-grid" class="speed-dial-grid">
      <a class="speed-dial-tile" href="https://example.com" data-url="https://example.com">
        <div class="speed-dial-icon">E</div>
        <span class="speed-dial-label">example.com</span>
      </a>
      <a class="speed-dial-tile" href="https://github.com" data-url="https://github.com">
        <div class="speed-dial-icon">G</div>
        <span class="speed-dial-label">GitHub</span>
      </a>
      <a class="speed-dial-tile" href="https://news.ycombinator.com" data-url="https://news.ycombinator.com">
        <div class="speed-dial-icon">H</div>
        <span class="speed-dial-label">Hacker News</span>
      </a>
      <a class="speed-dial-tile" href="https://en.wikipedia.org" data-url="https://en.wikipedia.org">
        <div class="speed-dial-icon">W</div>
        <span class="speed-dial-label">Wikipedia</span>
      </a>
      <a class="speed-dial-tile" href="https://mozilla.org" data-url="https://mozilla.org">
        <div class="speed-dial-icon">M</div>
        <span class="speed-dial-label">Mozilla</span>
      </a>
      <a class="speed-dial-tile" href="https://stackoverflow.com" data-url="https://stackoverflow.com">
        <div class="speed-dial-icon">S</div>
        <span class="speed-dial-label">Stack Overflow</span>
      </a>
    </div>
  </div>

  <div class="newtab-footer">
    <button id="btn-customize-newtab" class="newtab-footer-btn">Customize</button>
  </div>
</div>
