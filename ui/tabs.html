<div id="tab-strip" class="tab-strip" role="tablist" aria-label="Browser tabs">
  <div id="tab-list" class="tab-list">
    <div class="tab pinned-tab" role="tab" draggable="true" data-tab-id="0" aria-selected="false" title="example.com">
      <img class="tab-favicon" src="" alt="" width="16" height="16" />
      <span class="tab-title"></span>
    </div>
    <div class="tab active" role="tab" draggable="true" data-tab-id="1" aria-selected="true" title="Kore Browser">
      <img class="tab-favicon" src="" alt="" width="16" height="16" onerror="this.style.display='none'" />
      <span class="tab-title">New Tab</span>
      <button class="tab-close" tabindex="-1" aria-label="Close tab" title="Close (Ctrl+W)">&times;</button>
    </div>
  </div>
  <button id="btn-new-tab" class="new-tab-btn" title="New tab (Ctrl+T)" aria-label="New tab">+</button>
</div>
