<!DOCTYPE html>
<html lang="en" class="light-theme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kore UI Tests</title>
  <link rel="stylesheet" href="../theme.css" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #333);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    #test-controls {
      margin-bottom: 20px;
    }

    #btn-run {
      padding: 8px 20px;
      font-size: 14px;
      border: 1px solid var(--border, #ccc);
      border-radius: 6px;
      background: var(--accent, #1a73e8);
      color: #fff;
      cursor: pointer;
    }

    .test-summary {
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--bg-secondary, #f5f5f5);
      margin-bottom: 16px;
      font-size: 16px;
    }

    .test-suite {
      margin-bottom: 20px;
    }

    .test-suite-title {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text-secondary, #555);
    }

    .test-list {
      list-style: none;
      padding: 0;
    }

    .test-item {
      padding: 6px 12px;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--font-mono, monospace);
    }

    .test-pass {
      background: #e6f4ea;
      color: #137333;
    }

    .test-fail {
      background: #fce8e6;
      color: #c5221f;
    }

    .test-status {
      font-weight: 700;
      margin-right: 8px;
    }

    .test-error {
      margin-top: 4px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      font-size: 12px;
      color: #c5221f;
    }
  </style>
</head>
<body>
  <h1>Kore UI Test Suite</h1>

  <div id="test-controls">
    <button id="btn-run" onclick="runAllTests()">Run Tests</button>
  </div>

  <div id="test-results">
    <p style="color: var(--text-muted, #888)">Click "Run Tests" to execute all test suites.</p>
  </div>

  <script src="../omnibox.js"></script>
  <script src="../tabs.js"></script>
  <script src="test-runner.js"></script>
  <script src="omnibox.test.js"></script>
  <script src="tabs.test.js"></script>
  <script src="theme.test.js"></script>

  <script>
    function runAllTests() {
      var suites = [];

      if (window.koreTestRunner) {
        if (window.__omniBoxTest) suites.push(window.__omniBoxTest);
        if (window.__tabsTest) suites.push(window.__tabsTest);
        if (window.__themeTest) suites.push(window.__themeTest);
      }

      if (suites.length === 0) {
        var resultDiv = document.getElementById("test-results");
        resultDiv.innerHTML =
          '<div class="test-summary test-fail">Error: No test modules found</div>';
        return;
      }

      window.koreTestRunner.run(suites);
    }

    if (typeof window.__omniBoxTest === "undefined" && window.koreOmnibox) {
      window.__omniBoxTest = (function () {
        var module = document.querySelector('script[src*="omnibox.test"]');
        if (module) {
          return {
            name: "Omnibox Tests",
            tests: [
              { name: "loaded", run: function () {} },
            ],
          };
        }
        return null;
      })();
    }
  </script>
</body>
</html>
