    <button id="btn-forward" class="toolbar-btn" title="Forward (Alt+Right)" aria-label="Go forward" disabled>

    <button id="btn-reload" class="toolbar-btn" title="Reload (Ctrl+R)" aria-label="Reload page">

      class="omnibox-input"
      type="text"
      spellcheck="false"
      autocomplete="off"

      autocapitalize="off"
      placeholder="Search or enter address"
      aria-label="Address bar"
      role="combobox"
      aria-expanded="false"
      aria-autocomplete="list"
    />
